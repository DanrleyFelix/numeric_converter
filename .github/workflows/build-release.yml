name: Build Release Artifacts

on:
  push:
    branches:
      - v1.0
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os_name: windows
          - runner: ubuntu-latest
            os_name: linux
          - runner: macos-latest
            os_name: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt pytest

      - name: Run tests
        run: python -m pytest

      - name: Build portable artifact
        run: python build/build_app.py --os ${{ matrix.os_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: numeric-workbench-v1.0-${{ matrix.os_name }}
          path: dist/${{ matrix.os_name }}/**
